apiVersion: v1
kind: Secret
metadata:
  name: script-execution-manager-secrets
  labels:
    app: script-execution-manager
type: Opaque
stringData:
  # Database Configuration
  database_url: "sqlite:///script_manager.db"
  # Or use PostgreSQL: "postgresql://user:password@postgres-service:5432/dbname"
  
  # Jenkins Configuration
  jenkins_url: "http://jenkins-service:8080"
  jenkins_username: "your-jenkins-username"
  jenkins_password: "your-jenkins-password"
  
  # Artifactory Configuration
  artifactory_url: "http://artifactory-service:8082"
  artifactory_username: "your-artifactory-username"
  artifactory_password: "your-artifactory-password"
  artifactory_api_key: "your-artifactory-api-key"
  
  # Add any other sensitive configuration here
  # api_keys: "your-api-keys"
  # secrets: "your-secrets"