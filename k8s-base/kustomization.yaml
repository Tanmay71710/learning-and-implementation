apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: script-execution-manager

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secrets.yaml

commonLabels:
  app: script-execution-manager
  version: v1

images:
  - name: script-execution-manager
    newName: script-execution-manager
    newTag: latest