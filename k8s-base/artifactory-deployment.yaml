apiVersion: v1
kind: Namespace
metadata:
  name: artifactory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: artifactory-pvc
  namespace: artifactory
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: artifactory
  namespace: artifactory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: artifactory
  template:
    metadata:
      labels:
        app: artifactory
    spec:
      containers:
      - name: artifactory
        image: mattgruter/artifactory:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ARTIFACTORY_ADMIN_USERNAME
          value: "admin"
        - name: ARTIFACTORY_ADMIN_PASSWORD
          value: "password"
        volumeMounts:
        - name: artifactory-data
          mountPath: /var/opt/jfrog/artifactory
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: artifactory-data
        persistentVolumeClaim:
          claimName: artifactory-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: artifactory
  namespace: artifactory
spec:
  type: NodePort
  selector:
    app: artifactory
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    nodePort: 30082