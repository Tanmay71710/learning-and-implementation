apiVersion: v1
kind: Service
metadata:
  name: script-execution-manager
  labels:
    app: script-execution-manager
spec:
  type: LoadBalancer
  selector:
    app: script-execution-manager
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 5000
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800