apiVersion: v1
kind: ConfigMap
metadata:
  name: script-execution-manager-config
  labels:
    app: script-execution-manager
data:
  flask_env: "production"
  flask_debug: "0"
  jenkins_job_name: "script-execution-job"
  artifactory_repository: "docker-local"
  # Add any non-sensitive configuration here
  # For example:
  # log_level: "INFO"
  # max_workers: "4"
  # timeout: "300"