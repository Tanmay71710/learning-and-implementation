name: Build and Push Docker Image to Artifactory

on:
  push:
    branches: [ master, main, develop, staging, pub/dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main, develop, staging, pub/dev ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev, staging, pub-dev, production)'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - staging
        - pub-dev
        - production
      image_tag:
        description: 'Docker image tag'
        required: false
        default: 'latest'
      deploy_to_kubernetes:
        description: 'Deploy to Kubernetes after push'
        required: false
        default: true
        type: boolean

env:
  ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
  ARTIFACTORY_USERNAME: ${{ secrets.ARTIFACTORY_USERNAME }}
  ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_REPOSITORY: ${{ secrets.ARTIFACTORY_REPOSITORY }}
  IMAGE_NAME: script-execution-manager

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      environment: ${{ steps.set-env.outputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set environment
      id: set-env
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
        else
          if [ "${{ github.ref_name }}" == "master" ] || [ "${{ github.ref_name }}" == "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "pub/dev" ]; then
            echo "environment=pub-dev" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
        fi
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Artifactory
      uses: docker/login-action@v2
      with:
        registry: ${{ env.ARTIFACTORY_URL }}
        username: ${{ env.ARTIFACTORY_USERNAME }}
        password: ${{ env.ARTIFACTORY_PASSWORD }}
    
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.ARTIFACTORY_URL }}/${{ env.ARTIFACTORY_REPOSITORY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=registry,ref=${{ env.ARTIFACTORY_URL }}/${{ env.ARTIFACTORY_REPOSITORY }}/${{ env.IMAGE_NAME }}:buildcache
        cache-to: type=registry,ref=${{ env.ARTIFACTORY_URL }}/${{ env.ARTIFACTORY_REPOSITORY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
        build-args: |
          BUILD_DATE=${{ github.event.head_commit.timestamp }}
          VCS_REF=${{ github.sha }}
    
    - name: Image digest
      run: echo "Image digest is ${{ steps.meta.outputs.digest }}"
    
    - name: Update database with image information
      if: success()
      run: |
        # This would typically call your API to update the database
        # For now, we'll just echo the information
        echo "Image pushed to Artifactory"
        echo "Repository: ${{ env.ARTIFACTORY_REPOSITORY }}"
        echo "Image: ${{ env.IMAGE_NAME }}"
        echo "Tags: ${{ steps.meta.outputs.tags }}"
        echo "Digest: ${{ steps.meta.outputs.digest }}"
    
    - name: Notify deployment team
      if: success()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.EMAIL_SERVER }}
        server_port: ${{ secrets.EMAIL_PORT }}
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "Docker Image Built and Pushed - ${{ github.repository }}"
        to: ${{ secrets.EMAIL_RECIPIENTS }}
        from: GitHub Actions
        body: |
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          
          Docker Image: ${{ env.IMAGE_NAME }}
          Repository: ${{ env.ARTIFACTORY_REPOSITORY }}
          Tags: ${{ steps.meta.outputs.tags }}
          Digest: ${{ steps.meta.outputs.digest }}
          
          Artifactory URL: ${{ env.ARTIFACTORY_URL }}
          
          View Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        priority: high

  deploy-to-kubernetes:
    needs: build-and-push
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/pub/dev' || github.event.inputs.deploy_to_kubernetes == 'true')
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Configure kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        kubectl version --client
    
    - name: Install kustomize
      run: |
        curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
        sudo mv kustomize /usr/local/bin/
    
    - name: Set up Kubernetes cluster connection
      run: |
        # Configure kubectl to connect to your Kubernetes cluster
        # This can be done via:
        # 1. KUBECONFIG secret
        # 2. Service account with sufficient permissions
        # 3. Cloud provider-specific setup
        
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        kubectl cluster-info
    
    - name: Deploy to ${{ needs.build-and-push.outputs.environment }}
      run: |
        export KUBECONFIG=kubeconfig
        ENVIRONMENT="${{ needs.build-and-push.outputs.environment }}"
        
        # Build environment-specific manifests using Kustomize
        cd environments/${ENVIRONMENT}/k8s
        kustomize build . > /tmp/manifests.yaml
        
        # Apply the manifests
        kubectl apply -f /tmp/manifests.yaml
        
        # Wait for deployment to complete
        NAMESPACE=$(kubectl config view --minify -o jsonpath='{.contexts[0].context.namespace}')
        if [ -z "$NAMESPACE" ]; then
          NAMESPACE="script-execution-manager-${ENVIRONMENT}"
        fi
        
        kubectl rollout status deployment/script-execution-manager -n ${NAMESPACE} --timeout=5m
    
    - name: Verify deployment
      run: |
        export KUBECONFIG=kubeconfig
        ENVIRONMENT="${{ needs.build-and-push.outputs.environment }}"
        NAMESPACE="script-execution-manager-${ENVIRONMENT}"
        kubectl get pods -l app=script-execution-manager -n ${NAMESPACE}
        kubectl get services script-execution-manager -n ${NAMESPACE}
        kubectl describe deployment script-execution-manager -n ${NAMESPACE}
    
    - name: Get pod logs
      if: failure()
      run: |
        export KUBECONFIG=kubeconfig
        ENVIRONMENT="${{ needs.build-and-push.outputs.environment }}"
        NAMESPACE="script-execution-manager-${ENVIRONMENT}"
        kubectl logs -l app=script-execution-manager -n ${NAMESPACE} --tail=50
    
    - name: Notify deployment status
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.EMAIL_SERVER }}
        server_port: ${{ secrets.EMAIL_PORT }}
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "Kubernetes Deployment to ${{ needs.build-and-push.outputs.environment }} - ${{ job.status }}"
        to: ${{ secrets.EMAIL_RECIPIENTS }}
        from: GitHub Actions
        body: |
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Deployment Status: ${{ job.status }}
          
          Environment: ${{ needs.build-and-push.outputs.environment }}
          Kubernetes Cluster: Configured
          Deployment: script-execution-manager
          
          View Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        priority: high