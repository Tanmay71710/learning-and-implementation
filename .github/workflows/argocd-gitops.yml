name: GitOps with ArgoCD

on:
  push:
    branches: [ master, main, develop ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      sync_environment:
        description: 'Environment to sync (dev/staging/prod)'
        required: false
        default: 'all'
        type: choice
        options:
        - all
        - dev
        - staging
        - prod

env:
  ARGOCD_URL: ${{ secrets.ARGOCD_URL }}
  ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
  ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}

jobs:
  trigger-argocd-sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Install ArgoCD CLI
      run: |
        # Download ArgoCD CLI
        VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases/latest | grep 'tag_name' | cut -d'"' -f4)
        curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-amd64
        chmod +x argocd
        sudo mv argocd /usr/local/bin/
        argocd version
    
    - name: Configure ArgoCD context
      run: |
        argocd login ${{ env.ARGOCD_URL }} --username ${{ env.ARGOCD_USERNAME }} --password ${{ env.ARGOCD_PASSWORD }} --grpc-web
        argocd cluster add argocd --context argocd
        argocd context set argocd
    
    - name: Trigger ArgoCD sync for production
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      run: |
        echo "Triggering sync for production environment"
        argocd app sync script-execution-manager-prod --context argocd
        argocd app wait script-execution-manager-prod --health --timeout 300 --context argocd
    
    - name: Trigger ArgoCD sync for staging
      if: github.ref == 'refs/heads/develop'
      run: |
        echo "Triggering sync for staging environment"
        argocd app sync script-execution-manager-staging --context argocd
        argocd app wait script-execution-manager-staging --health --timeout 300 --context argocd
    
    - name: Trigger ArgoCD sync for development
      if: github.ref == 'refs/heads/feature/*' || github.event.inputs.sync_environment == 'dev'
      run: |
        echo "Triggering sync for development environment"
        argocd app sync script-execution-manager-dev --context argocd
        argocd app wait script-execution-manager-dev --health --timeout 300 --context argocd
    
    - name: Sync all environments
      if: github.event.inputs.sync_environment == 'all'
      run: |
        echo "Triggering sync for all environments"
        argocd app sync script-execution-manager-prod --context argocd
        argocd app sync script-execution-manager-staging --context argocd
        argocd app sync script-execution-manager-dev --context argocd
        
        argocd app wait script-execution-manager-prod --health --timeout 300 --context argocd
        argocd app wait script-execution-manager-staging --health --timeout 300 --context argocd
        argocd app wait script-execution-manager-dev --health --timeout 300 --context argocd
    
    - name: Get ArgoCD application status
      run: |
        echo "=== Production Status ==="
        argocd app get script-execution-manager-prod --context argocd --output json
        echo "=== Staging Status ==="
        argocd app get script-execution-manager-staging --context argocd --output json
        echo "=== Development Status ==="
        argocd app get script-execution-manager-dev --context argocd --output json
    
    - name: Verify deployment health
      run: |
        echo "Verifying deployment health..."
        argocd app wait script-execution-manager-prod --health --timeout 300 --context argocd || echo "Production health check failed"
        argocd app wait script-execution-manager-staging --health --timeout 300 --context argocd || echo "Staging health check failed"
        argocd app wait script-execution-manager-dev --health --timeout 300 --context argocd || echo "Development health check failed"
    
    - name: Notify sync status
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.EMAIL_SERVER }}
        server_port: ${{ secrets.EMAIL_PORT }}
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "ArgoCD Sync - ${{ job.status }}"
        to: ${{ secrets.EMAIL_RECIPIENTS }}
        from: GitHub Actions
        body: |
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Sync Status: ${{ job.status }}
          
          ArgoCD URL: ${{ env.ARGOCD_URL }}
          Environments: Production, Staging, Development
          
          View Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        priority: high

  update-manifests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Update production manifests
      run: |
        # Update image tag in production manifests
        if [ "${{ github.ref_type }}" == "tag" ]; then
          TAG="${GITHUB_REF#refs/tags/}"
        else
          TAG="latest"
        fi
        
        echo "Updating manifests with tag: $TAG"
        
        # Update deployment.yaml with new image tag
        sed -i "s|IMAGE_TAG|$TAG|g" k8s/deployment.yaml
        sed -i "s|ARTIFACTORY_URL|${{ secrets.ARTIFACTORY_URL }}|g" k8s/deployment.yaml
        sed -i "s|ARTIFACTORY_REPOSITORY|${{ secrets.ARTIFACTORY_REPOSITORY }}|g" k8s/deployment.yaml
        
        # Commit and push changes
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add k8s/deployment.yaml
        git commit -m "Update image tag to $TAG"
        git push origin master
    
    - name: Trigger ArgoCD sync
      run: |
        # Install ArgoCD CLI
        VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases/latest | grep 'tag_name' | cut -d'"' -f4)
        curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/download/${VERSION}/argocd-linux-amd64
        chmod +x argocd
        sudo mv argocd /usr/local/bin/
        
        # Configure ArgoCD
        argocd login ${{ env.ARGOCD_URL }} --username ${{ env.ARGOCD_USERNAME }} --password ${{ env.ARGOCD_PASSWORD }} --grpc-web
        argocd cluster add argocd --context argocd
        argocd context set argocd
        
        # Trigger sync
        argocd app sync script-execution-manager-prod --context argocd
        
        # Wait for health
        argocd app wait script-execution-manager-prod --health --timeout 300 --context argocd