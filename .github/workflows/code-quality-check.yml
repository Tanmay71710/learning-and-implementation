name: Code Quality Check and Notification

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  lint-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install flake8
        pip install black
        pip install isort
        pip install bandit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run Black (code formatting check)
      run: |
        black --check --diff .
      continue-on-error: true
    
    - name: Run isort (import sorting check)
      run: |
        isort --check-only --diff .
      continue-on-error: true
    
    - name: Run Flake8 (style guide enforcement)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Run Bandit (security linter)
      run: |
        bandit -r . -f json -o bandit-report.json || true
      continue-on-error: true
    
    - name: Run Pylint (code analysis)
      id: pylint
      run: |
        pylint --exit-zero --output-format=json:pylint-report.json,text:pylint-report.txt app.py models.py || true
        pylint --exit-zero scripts/*.sh || true
      continue-on-error: true
    
    - name: Generate Pylint Score
      id: pylint_score
      run: |
        if [ -f pylint-report.json ]; then
          SCORE=$(python -c "import json; data=json.load(open('pylint-report.json')); print(data.get('score', 'N/A'))" || echo "N/A")
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Pylint Score: $SCORE" >> $GITHUB_STEP_SUMMARY
        else
          echo "score=N/A" >> $GITHUB_OUTPUT
          echo "Pylint Score: N/A" >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Upload Pylint Report
      uses: actions/upload-artifact@v3
      with:
        name: pylint-report
        path: |
          pylint-report.json
          pylint-report.txt
          bandit-report.json
    
    - name: Comment PR with Pylint Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          let comment = '## 🔍 Code Quality Check Results\n\n';
          
          try {
            const pylintData = JSON.parse(fs.readFileSync('pylint-report.json', 'utf8'));
            const score = pylintData.score || 'N/A';
            comment += `### Pylint Score: ${score}/10\n\n`;
            
            if (pylintData.messages && pylintData.messages.length > 0) {
              comment += '### Pylint Issues:\n';
              pylintData.messages.slice(0, 10).forEach(msg => {
                comment += `- **${msg.type}** in ${msg.path}:${msg.line}: ${msg.message}\n`;
              });
              if (pylintData.messages.length > 10) {
                comment += `... and ${pylintData.messages.length - 10} more issues\n`;
              }
            }
          } catch (e) {
            comment += '### Pylint Score: N/A\n\n';
          }
          
          try {
            const banditData = JSON.parse(fs.readFileSync('bandit-report.json', 'utf8'));
            if (banditData.results && banditData.results.length > 0) {
              comment += '### Security Issues Found:\n';
              banditData.results.slice(0, 5).forEach(issue => {
                comment += `- **${issue.issue_text}** in ${issue.filename}\n';
              });
            } else {
              comment += '### ✅ No security issues found\n';
            }
          } catch (e) {
            comment += '### Security Check: N/A\n';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
    
    - name: Send Email Notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: ${{ secrets.EMAIL_SERVER }}
        server_port: ${{ secrets.EMAIL_PORT }}
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "GitHub Actions: Code Quality Check - ${{ job.status }}"
        to: ${{ secrets.EMAIL_RECIPIENTS }}
        from: GitHub Actions
        body: |
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Status: ${{ job.status }}
          
          Pylint Score: ${{ steps.pylint_score.outputs.score }}
          
          Workflow: ${{ github.workflow }}
          Run Number: ${{ github.run_number }}
          
          View Details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        priority: high
    
    - name: Send Slack Notification (Alternative)
      if: always()
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "GitHub Actions Code Quality Check",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Code Quality Check Results*\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Status:* ${{ job.status }}\n*Pylint Score:* ${{ steps.pylint_score.outputs.score }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      continue-on-error: true