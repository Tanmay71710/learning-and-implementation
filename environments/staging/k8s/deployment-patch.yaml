apiVersion: apps/v1
kind: Deployment
metadata:
  name: script-execution-manager
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: script-execution-manager
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"