apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-config
  namespace: minio-prod
  labels:
    app: minio
    environment: production
data:
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: prod-secure-minio-admin
  MINIO_ENDPOINT: http://minio:9000
  MINIO_BUCKET: script-execution-manager-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio-prod
  labels:
    app: minio
    environment: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        environment: production
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        ports:
        - containerPort: 9000
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            configMapKeyRef:
              name: minio-config
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: minio-config
              key: MINIO_ROOT_PASSWORD
        command:
        - /bin/sh
        - -c
        - minio server /data --console-address ":9001"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-pvc-prod
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc-prod
  namespace: minio-prod
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio-prod
  labels:
    app: minio
    environment: production
spec:
  type: LoadBalancer
  selector:
    app: minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001