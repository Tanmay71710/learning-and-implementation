apiVersion: apps/v1
kind: Deployment
metadata:
  name: script-execution-manager
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: script-execution-manager
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"