apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-pub-dev
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  labels:
    environment: pub-dev
    app: jenkins
spec:
  project: script-execution-manager
  source:
    repoURL: https://github.com/Tanmay71710/learning-and-implementation
    targetRevision: pub/dev
    path: environments/pub-dev/jenkins-deployment.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: jenkins-pub-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true