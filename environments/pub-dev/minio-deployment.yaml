apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-config
  namespace: minio-pub-dev
  labels:
    app: minio
    environment: pub-dev
data:
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: pubdev-minio-admin
  MINIO_ENDPOINT: http://minio:9000
  MINIO_BUCKET: script-execution-manager-pubdev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio-pub-dev
  labels:
    app: minio
    environment: pub-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        environment: pub-dev
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        ports:
        - containerPort: 9000
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            configMapKeyRef:
              name: minio-config
              key: MINIO_ROOT_USER
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            configMapKeyRef:
              name: minio-config
              key: MINIO_ROOT_PASSWORD
        command:
        - /bin/sh
        - -c
        - minio server /data --console-address ":9001"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-pvc-pub-dev
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc-pub-dev
  namespace: minio-pub-dev
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio-pub-dev
  labels:
    app: minio
    environment: pub-dev
spec:
  type: LoadBalancer
  selector:
    app: minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001