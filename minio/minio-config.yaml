apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-config
  labels:
    app.kubernetes.io/name: minio-config
    app.kubernetes.io/part-of: argocd
  namespace: argocd
data:
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: minioadmin
  MINIO_ENDPOINT: http://minio:9000
  MINIO_BUCKET: script-execution-manager