# Prometheus Stack Configuration for GitOps Project
# Using kube-prometheus-stack Helm Chart

# Default namespace for monitoring
namespaceOverride: monitoring

# Global configuration
global:
  rbac:
    create: true
  labels:
    app: monitoring-stack
    environment: production

# Prometheus Operator configuration
prometheusOperator:
  enabled: true
  createCustomResource: true
  admissionWebhooks:
    enabled: true
  prometheusConfigReloader:
    resources:
      limits:
        cpu: 200m
        memory: 50Mi
      requests:
        cpu: 100m
        memory: 25Mi

# Prometheus configuration
prometheus:
  enabled: true
  prometheusSpec:
    replicas: 2
    replicaExternalLabelName: "replica"
    resources:
      limits:
        cpu: 1000m
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    retention: 15d
    retentionSize: 10GB
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector:
      any: true
    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector:
      any: true
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector:
      any: true
    scrapeInterval: 30s
    scrapeTimeout: 10s
    evaluationInterval: 30s
    walCompression: true
    enableAdminAPI: false
    externalLabels:
      cluster: gitops-cluster
      environment: production
    
    # Additional scrape configurations
    additionalScrapeConfigs:
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_node_name]
            action: replace
            target_label: kubernetes_node_name

      - job_name: 'kubernetes-nodes'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
          - source_labels: [__meta_kubernetes_node_name]
            action: replace
            target_label: node

      - job_name: 'jenkins'
        metrics_path: /prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - jenkins-dev
                - jenkins-staging
                - jenkins-pub-dev
                - jenkins-production
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: jenkins
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace

      - job_name: 'argocd'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: service
            namespaces:
              names:
                - argocd
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: argocd-metrics
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace

      - job_name: 'artifactory'
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - artifactory-dev
                - artifactory-staging
                - artifactory-pub-dev
                - artifactory-production
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: artifactory
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace

      - job_name: 'flask-app'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - script-execution-manager-dev
                - script-execution-manager-staging
                - script-execution-manager-pub-dev
                - script-execution-manager-production
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: script-execution-manager
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace

# Grafana configuration
grafana:
  enabled: true
  replicas: 2
  persistence:
    enabled: true
    storageClassName: standard
    accessModes: ["ReadWriteOnce"]
    size: 5Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  adminPassword: admin
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.gitops.local
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.gitops.local
  
  # Grafana sidecar for dashboards
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      label: grafana_dashboard
    datasources:
      enabled: true
      searchNamespace: ALL
      label: grafana_datasource
  
  # Default dashboards
  defaultDashboardsEnabled: true
  
  # Additional Grafana configuration
  grafana.ini:
    server:
      root_url: https://grafana.gitops.local
    auth:
      disable_login_form: false
    users:
      default_theme: dark
    dashboards:
      default_home_dashboard_path: /tmp/dashboards/home.json
    log:
      mode: console
      level: info

# Alertmanager configuration
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 3
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    retention: 120h
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
    externalLabels:
      cluster: gitops-cluster
      environment: production
  
  # Alertmanager configuration
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
    
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default-receiver'
      routes:
        - match:
            severity: critical
          receiver: 'critical-receiver'
          continue: true
        - match:
            severity: warning
          receiver: 'warning-receiver'
        - match:
            alertname: 'Watchdog'
          receiver: 'null-receiver'
    
    receivers:
      - name: 'default-receiver'
        slack_configs:
          - channel: '#alerts-default'
            send_resolved: true
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
      
      - name: 'critical-receiver'
        slack_configs:
          - channel: '#alerts-critical'
            send_resolved: true
            title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        pagerduty_configs:
          - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
            severity: critical
      
      - name: 'warning-receiver'
        slack_configs:
          - channel: '#alerts-warning'
            send_resolved: true
            title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
      
      - name: 'null-receiver'

# Node Exporter configuration
nodeExporter:
  enabled: true
  serviceMonitor:
    enabled: true
    relabelings:
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: node
        action: replace

# Kube-State-Metrics configuration
kubeStateMetrics:
  enabled: true
  serviceMonitor:
    enabled: true

# cAdvisor is built into Kubelet
kubelet:
  enabled: true
  serviceMonitor:
    enabled: true

# Additional Kubernetes components monitoring
kubeControllerManager:
  enabled: true
  serviceMonitor:
    enabled: true

kubeScheduler:
  enabled: true
  serviceMonitor:
    enabled: true

kubeProxy:
  enabled: true
  serviceMonitor:
    enabled: true

etcd:
  enabled: true
  serviceMonitor:
    enabled: true

# Default PrometheusRule for common alerts
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubeScheduler: true
    node: true
    network: true
    prometheus: true
    scheduler: true
    time: true

# Additional custom rules
additionalPrometheusRules:
  - name: custom-alerts
    rules:
      # Flask Application Alerts
      - alert: FlaskAppDown
        expr: up{job="flask-app"} == 0
        for: 5m
        labels:
          severity: critical
          component: flask-app
        annotations:
          summary: Flask application is down
          description: "Flask application {{ $labels.instance }} has been down for more than 5 minutes."

      - alert: FlaskAppHighErrorRate
        expr: rate(flask_http_request_exceptions_total[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
          component: flask-app
        annotations:
          summary: Flask application high error rate
          description: "Flask application {{ $labels.instance }} has error rate {{ $value }} for the last 5 minutes."

      - alert: FlaskAppHighLatency
        expr: histogram_quantile(0.95, rate(flask_http_request_duration_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
          component: flask-app
        annotations:
          summary: Flask application high latency
          description: "Flask application {{ $labels.instance }} has 95th percentile latency of {{ $value }}s."

      # Jenkins Alerts
      - alert: JenkinsDown
        expr: jenkins_up{job="jenkins"} == 0
        for: 5m
        labels:
          severity: critical
          component: jenkins
        annotations:
          summary: Jenkins is down
          description: "Jenkins instance {{ $labels.instance }} has been down for more than 5 minutes."

      - alert: JenkinsBuildFailureRate
        expr: rate(jenkins_job_build_failure_total[1h]) > 0.1
        for: 15m
        labels:
          severity: warning
          component: jenkins
        annotations:
          summary: Jenkins high build failure rate
          description: "Jenkins job {{ $labels.job }} has failure rate {{ $value }} for the last hour."

      - alert: JenkinsQueueBacklog
        expr: jenkins_queue_size{job="jenkins"} > 10
        for: 10m
        labels:
          severity: warning
          component: jenkins
        annotations:
          summary: Jenkins queue backlog
          description: "Jenkins queue size is {{ $value }} for more than 10 minutes."

      # ArgoCD Alerts
      - alert: ArgoCDSyncFailure
        expr: argocd_app_sync_status{sync_status!="Synced"} == 1
        for: 10m
        labels:
          severity: critical
          component: argocd
        annotations:
          summary: ArgoCD application sync failure
          description: "ArgoCD application {{ $labels.app_name }} is out of sync for more than 10 minutes."

      - alert: ArgoCDAppHealthDegraded
        expr: argocd_app_health_status{health_status!="Healthy"} == 1
        for: 15m
        labels:
          severity: critical
          component: argocd
        annotations:
          summary: ArgoCD application health degraded
          description: "ArgoCD application {{ $labels.app_name }} health status is {{ $labels.health_status }}."

      - alert: ArgoCDRepositorySyncFailure
        expr: rate(argocd_repo_sync_failed_total[1h]) > 0.05
        for: 15m
        labels:
          severity: warning
          component: argocd
        annotations:
          summary: ArgoCD repository sync failure rate
          description: "ArgoCD repository {{ $labels.repo }} has sync failure rate {{ $value }}."

      # Artifactory Alerts
      - alert: ArtifactoryDown
        expr: artifactory_up == 0
        for: 5m
        labels:
          severity: critical
          component: artifactory
        annotations:
          summary: Artifactory is down
          description: "Artifactory instance {{ $labels.instance }} has been down for more than 5 minutes."

      - alert: ArtifactoryStorageHigh
        expr: artifactory_storage_used_bytes / artifactory_storage_total_bytes > 0.8
        for: 15m
        labels:
          severity: warning
          component: artifactory
        annotations:
          summary: Artifactory storage usage high
          description: "Artifactory storage usage is {{ $value | humanizePercentage }}."

      - alert: ArtifactoryHighErrorRate
        expr: rate(artifactory_request_errors_total[5m]) > 0.05
        for: 10m
        labels:
          severity: critical
          component: artifactory
        annotations:
          summary: Artifactory high error rate
          description: "Artifactory error rate is {{ $value }} for the last 5 minutes."

      # Database Alerts
      - alert: DatabaseHighErrorRate
        expr: rate(flask_db_query_errors_total[5m]) > 0.001
        for: 5m
        labels:
          severity: critical
          component: database
        annotations:
          summary: Database high error rate
          description: "Database error rate is {{ $value }} for the last 5 minutes."

      - alert: DatabaseSlowQueries
        expr: histogram_quantile(0.95, rate(flask_db_query_duration_seconds_bucket[5m])) > 1
        for: 10m
        labels:
          severity: warning
          component: database
        annotations:
          summary: Database slow queries
          description: "Database 95th percentile query latency is {{ $value }}s."

      # GitOps Alerts
      - alert: GitOpsDeploymentFailure
        expr: kube_deployment_status_replicas_available < kube_deployment_spec_replicas
        for: 15m
        labels:
          severity: critical
          component: gitops
        annotations:
          summary: GitOps deployment failure
          description: "Deployment {{ $labels.deployment }} has unavailable replicas for more than 15 minutes."

      - alert: GitOpsPodCrashLoop
        expr: rate(kube_pod_container_status_restarts_total[10m]) > 0
        for: 15m
        labels:
          severity: critical
          component: gitops
        annotations:
          summary: GitOps pod crash loop
          description: "Pod {{ $labels.pod }} is in crash loop for more than 15 minutes."