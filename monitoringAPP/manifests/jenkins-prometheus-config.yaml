# Jenkins Prometheus Plugin Configuration
# Add this to your Jenkins configuration

apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-prometheus-config
  namespace: jenkins-dev
data:
  prometheus.yml: |
    # Jenkins Prometheus Configuration
    # This configuration enables Prometheus metrics in Jenkins
    
    # Install Prometheus Plugin in Jenkins:
    # 1. Go to Manage Jenkins -> Manage Plugins
    # 2. Search for "Prometheus Plugin"
    # 3. Install and restart Jenkins
    
    # Configure Prometheus Plugin:
    # 1. Go to Manage Jenkins -> Configure System
    # 2. Scroll to "Prometheus" section
    # 3. Configure the following settings:
    
    # Prometheus Configuration
    prometheus:
      # Enable/disable the Prometheus endpoint
      enabled: true
      
      # Endpoint path for Prometheus metrics
      endpoint: /prometheus
      
      # Authentication method (none, basic, bearer)
      authentication:
        type: none
      
      # Collect default Jenkins metrics
      defaultCollectors:
        - jenkins
        - executor
        - queue
        - node
        - job
        - build
      
      # Custom collectors
      customCollectors: []
      
      # Metrics path
      path: prometheus
      
      # Metrics port (default: 8080)
      port: 8080
      
      # Collect detailed build metrics
      collectBuildMetrics: true
      
      # Collect detailed job metrics
      collectJobMetrics: true
      
      # Collect detailed node metrics
      collectNodeMetrics: true
      
      # Collect detailed queue metrics
      collectQueueMetrics: true
      
      # Collect detailed executor metrics
      collectExecutorMetrics: true
      
      # Metrics collection interval (in seconds)
      collectionInterval: 60
      
      # Enable/disable job attribute collection
      collectJobAttributeMetrics: true
      
      # Enable/disable build parameter collection
      collectBuildParameterMetrics: true
      
      # Enable/disable build label collection
      collectBuildLabelMetrics: true
      
      # Enable/disable job run count collection
      collectJobRunCountMetrics: true
      
      # Enable/disable job duration collection
      collectJobDurationMetrics: true
      
      # Enable/disable job success/failure collection
      collectJobSuccessCountMetrics: true
      
      # Enable/disable job failure count collection
      collectJobFailureCountMetrics: true

---
# ServiceMonitor for Jenkins
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: jenkins
  namespace: jenkins-dev
  labels:
    app: jenkins
    release: prometheus
spec:
  selector:
    matchLabels:
      app: jenkins
  endpoints:
  - port: http
    path: /prometheus
    interval: 30s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - jenkins-dev
---
# PrometheusRule for Jenkins alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: jenkins-alerts
  namespace: jenkins-dev
  labels:
    app: jenkins
    release: prometheus
    role: alert-rules
spec:
  groups:
  - name: jenkins.rules
    interval: 30s
    rules:
    - alert: JenkinsDown
      expr: jenkins_up{job="jenkins"} == 0
      for: 5m
      labels:
        severity: critical
        component: jenkins
      annotations:
        summary: Jenkins is down
        description: "Jenkins instance {{ $labels.instance }} has been down for more than 5 minutes."
    
    - alert: JenkinsBuildFailureRateHigh
      expr: rate(jenkins_job_build_failure_total[1h]) > 0.1
      for: 15m
      labels:
        severity: warning
        component: jenkins
      annotations:
        summary: Jenkins build failure rate is high
        description: "Jenkins job {{ $labels.job }} has failure rate {{ $value | humanizePercentage }} for the last hour."
    
    - alert: JenkinsQueueBacklog
      expr: jenkins_queue_size{job="jenkins"} > 10
      for: 10m
      labels:
        severity: warning
        component: jenkins
      annotations:
        summary: Jenkins queue backlog
        description: "Jenkins queue size is {{ $labels.queue_size }} for more than 10 minutes."
    
    - alert: JenkinsExecutorStarvation
      expr: jenkins_executor_available_value{job="jenkins"} == 0
      for: 5m
      labels:
        severity: warning
        component: jenkins
      annotations:
        summary: Jenkins executor starvation
        description: "No executors available in Jenkins {{ $labels.instance }} for more than 5 minutes."
    
    - alert: JenkinsNodeOffline
      expr: jenkins_node_online_value{job="jenkins"} == 0
      for: 5m
      labels:
        severity: critical
        component: jenkins
      annotations:
        summary: Jenkins node offline
        description: "Jenkins node {{ $labels.node }} is offline for more than 5 minutes."
    
    - alert: JenkinsOldBuilds
      expr: jenkins_job_last_build_timestamp{job="jenkins"} < time() - 86400
      for: 1h
      labels:
        severity: info
        component: jenkins
      annotations:
        summary: Jenkins job has old builds
        description: "Jenkins job {{ $labels.job }} last build was more than 24 hours ago."