version: '3.8'

services:
  flask-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - JENKINS_URL=http://10.118.244.255:30080
      - JENKINS_USERNAME=${JENKINS_USERNAME}
      - JENKINS_PASSWORD=${JENKINS_PASSWORD}
      - JENKINS_JOB_NAME=${JENKINS_JOB_NAME:-script-execution-job}
      - ARTIFACTORY_URL=http://10.118.244.255:30082/artifactory
      - ARTIFACTORY_USERNAME=${ARTIFACTORY_USERNAME}
      - ARTIFACTORY_PASSWORD=${ARTIFACTORY_PASSWORD}
      - ARTIFACTORY_REPOSITORY=${ARTIFACTORY_REPOSITORY:-docker-local}
      - ARTIFACTORY_API_KEY=${ARTIFACTORY_API_KEY}
      - DATABASE_URL=sqlite:///script_manager.db
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=script-execution-manager
    volumes:
      - ./scripts:/app/scripts
      - ./script_manager.db:/app/script_manager.db
    depends_on:
      - minio
    networks:
      - app-network

  # Jenkins - Now running on Kubernetes
  # jenkins:
  #   image: jenkins/jenkins:lts
  #   ports:
  #     - "8080:8080"
  #     - "50000:50000"
  #   environment:
  #     - JENKINS_ADMIN_ID=${JENKINS_ADMIN_ID:-admin}
  #     - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-admin}
  #   volumes:
  #     - jenkins_data:/var/jenkins_home
  #   networks:
  #     - app-network

  # Artifactory - Now running on Kubernetes
  # artifactory:
  #   image: mattgruter/artifactory:latest
  #   ports:
  #     - "9082:8080"
  #   environment:
  #     - ARTIFACTORY_ADMIN_USERNAME=${ARTIFACTORY_ADMIN_USERNAME:-admin}
  #     - ARTIFACTORY_ADMIN_PASSWORD=${ARTIFACTORY_ADMIN_PASSWORD:-password}
  #   volumes:
  #     - artifactory_data:/var/opt/jfrog/artifactory
  #   networks:
  #     - app-network

  minio:
    image: minio/minio:latest
    command: server /data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  jenkins_data:
  artifactory_data:
  minio_data:

networks:
  app-network:
    driver: bridge